extra:
  # hide the "Made with Material for MkDocs" message
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/pydantic/pydantic-ai
    - icon: fontawesome/brands/bluesky
      link: https://bsky.app/profile/pydantic.dev
    - icon: fontawesome/brands/x-twitter
      link: https://x.com/pydantic
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/company/pydantic

theme:
  name: "material"
  custom_dir: docs/.overrides
  palette:
    - media: "(prefers-color-scheme)"
      primary: pink
      accent: pink
      toggle:
        icon: material/brightness-auto
        name: "Switch to light mode"
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: pink
      accent: pink
      toggle:
        icon: material/brightness-7
        name: "Switch to dark mode"
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: pink
      accent: pink
      toggle:
        icon: material/brightness-4
        name: "Switch to system preference"
  features:
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotate
    - content.code.copy
    - content.code.select
    - navigation.path
    - navigation.indexes
    - navigation.sections
    - navigation.tracking
    - toc.follow
    - announce.dismiss
  logo: "img/logo-white.svg"
  favicon: "favicon.ico"

# https://www.mkdocs.org/user-guide/configuration/#validation
validation:
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn
  anchors: warn

extra_css:
  - "extra/tweaks.css"
# used for analytics
extra_javascript:
  - "/flarelytics/client.js"
  - "https://cdn.jsdelivr.net/npm/algoliasearch@5.20.0/dist/lite/builds/browser.umd.js"
  - "https://cdn.jsdelivr.net/npm/instantsearch.js@4.77.3/dist/instantsearch.production.min.js"
  - "/javascripts/algolia-search.js"

markdown_extensions:
  - tables
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.mark
  - pymdownx.superfences
  - pymdownx.snippets
  - pymdownx.tilde
  - pymdownx.inlinehilite
  - pymdownx.highlight:
      pygments_lang_class: true
  - pymdownx.extra:
      pymdownx.superfences:
        custom_fences:
          - name: mermaid
            class: mermaid
            format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      options:
        custom_icons:
          - docs/.overrides/.icons
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - sane_lists # this means you can start a list from any number
  - material.extensions.preview:
      targets:
        include:
          - '*'
  - pydantic_docs.mdext

watch:
  - pydantic_ai_slim
  - pydantic_evals
  - pydantic_graph
  - examples

plugins:
  - search
  - social
  - glightbox
  - mkdocstrings:
      handlers:
        python:
          paths: [pydantic_ai_slim/pydantic_ai]
          options:
            docstring_options:
              # pydantic_graph/beta/graph.py uses "Type Parameters:" sections to document Generic type params
              # like StateT, OutputT, etc. Griffe can't extract these from Generic[T] base classes
              # (only from PEP 695 syntax), so we disable the validation warnings.
              warn_unknown_params: false
            relative_crossrefs: true
            members_order: source
            separate_signature: true
            show_signature_annotations: true
            signature_crossrefs: true
            group_by_category: false
            # 3 because docs are in pages with an H2 just above them
            heading_level: 3
            extensions:
              - griffe_warnings_deprecated:
                  kind: warning
                  title: Deprecated
          inventories:
            - url: https://logfire.pydantic.dev/docs/objects.inv
            - url: https://docs.python.org/3/objects.inv
            - url: https://docs.pydantic.dev/latest/objects.inv
            - url: https://dirty-equals.helpmanual.io/latest/objects.inv
            - url: https://fastapi.tiangolo.com/objects.inv
            - url: https://typing-extensions.readthedocs.io/en/latest/objects.inv
            - url: https://rich.readthedocs.io/en/stable/objects.inv
            - url: https://modelcontextprotocol.github.io/python-sdk/objects.inv
            # waiting for https://github.com/encode/httpx/discussions/3091#discussioncomment-11205594
  - llmstxt:
      enabled: !ENV [CI, false]
      full_output: llms-full.txt
      markdown_description: |-
        Pydantic AI is a Python agent framework designed to make it less painful to build production grade
        applications with Generative AI.
      sections:
        Introduction:
          - index.md
          - install.md
          - help.md
          - troubleshooting.md
          - coding-agent-skills.md
        Concepts documentation:
          - a2a.md
          - agent.md
          - agent-spec.md
          - native-tools.md
          - capabilities.md
          - dependencies.md
          - deferred-tools.md
          - direct.md
          - embeddings.md
          - gateway.md
          - input.md
          - tools.md
          - common-tools.md
          - output.md
          - retries.md
          - message-history.md
          - extensibility.md
          - hooks.md
          - multi-agent-applications.md
          - thinking.md
          - third-party-tools.md
          - tools-advanced.md
          - toolsets.md
          - web.md
        Models:
          - models/*.md
        Graphs:
          - graph.md
          - graph/*.md
        API Reference:
          - api/*.md
        Evals:
          - evals.md
          - evals/*.md
        Durable Execution:
          - durable_execution/*.md
        MCP:
          - mcp/*.md
        UI Event Streams:
          - ui/*.md
        Optional:
          - testing.md
          - cli.md
          - logfire.md
          - contributing.md
          - changelog.md
          - version-policy.md
        Examples:
          - examples/*.md

# DON'T PUT REDIRECTS IN THIS FILE! Instead add them to docs-site/src/index.ts

hooks:
  - "docs/.hooks/main.py"
  - "docs/.hooks/algolia.py"
